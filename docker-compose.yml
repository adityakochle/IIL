version: "3.9"

# Local Qdrant instance for development/testing
# For production use Qdrant Cloud (set QDRANT_URL + QDRANT_API_KEY in .env)

services:
  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: iil-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"    # REST API
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  qdrant_storage:
    driver: local
